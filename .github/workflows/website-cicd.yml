name: Website CI

on:
  push:
    branches:
      - cap-nhat-moi-nhat
    paths:
      - "car-rental-website/**"
      - ".github/workflows/website-cicd.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: car-rental-website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: car-rental-website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm build
